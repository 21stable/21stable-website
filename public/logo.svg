<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- 21Stable Logo - Minimalist Geometric -->
  
  <!-- Background circle (subtle) -->
  <circle cx="60" cy="60" r="56" stroke="#000" stroke-width="1" fill="none"/>
  
  <!-- "21" as stylized number -->
  <g fill="#000">
    <!-- 2 -->
    <path d="M35 45 Q35 35 45 35 L55 35 Q65 35 65 45 Q65 52 55 55 L45 58 Q40 59 40 65 L40 68 L65 68 L65 72 L35 72 L35 65 Q35 55 48 52 L55 50 Q58 49 58 45 Q58 40 52 40 L45 40 Q40 40 39 45 Z"/>
    
    <!-- 1 -->
    <rect x="75" y="35" width="10" height="37"/>
    <rect x="70" y="35" width="15" height="5"/>
  </g>
  
  <!-- Stable indicator - horizontal line below -->
  <line x1="35" y1="82" x2="85" y2="82" stroke="#000" stroke-width="2"/>
  
  <!-- Small stability markers -->
  <circle cx="40" cy="82" r="2" fill="#000"/>
  <circle cx="60" cy="82" r="2" fill="#000"/>
  <circle cx="80" cy="82" r="2" fill="#000"/>
</svg>