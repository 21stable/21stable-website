<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <!-- 21Stable Full Logo - High Resolution -->
  
  <!-- Background -->
  <rect width="800" height="200" fill="#ffffff"/>
  
  <!-- Icon Circle -->
  <g transform="translate(50, 40)">
    <!-- Outer ring -->
    <circle cx="60" cy="60" r="56" stroke="#000000" stroke-width="2" fill="none"/>
    
    <!-- "21" in Georgia serif -->
    <text x="15" y="80" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="500" fill="#000000">21</text>
    
    <!-- Stability line -->
    <line x1="25" y1="95" x2="95" y2="95" stroke="#000000" stroke-width="2"/>
  </g>
  
  <!-- Wordmark -->
  <g transform="translate(180, 60)">
    <!-- "Stable" in light sans-serif -->
    <text x="0" y="80" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="300" letter-spacing="-0.02em" fill="#000000">Stable</text>
    
    <!-- Tagline -->
    <text x="2" y="120" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" letter-spacing="0.15em" fill="#666666">STATISTICAL CONSULTING</text>
  </g>
</svg>