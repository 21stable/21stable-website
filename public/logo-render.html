<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; padding: 40px; background: white; }
    svg { width: 1200px; height: 300px; }
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
    <!-- White background -->
    <rect width="1200" height="300" fill="#ffffff"/>
    
    <!-- Icon Circle -->
    <g transform="translate(60, 30)">
      <!-- Outer ring -->
      <circle cx="120" cy="120" r="112" stroke="#000000" stroke-width="4" fill="none"/>
      
      <!-- "21" - rendered as paths for better compatibility -->
      <g transform="translate(30, 50)">
        <!-- "2" -->
        <path d="M10 0 Q10 -20 30 -20 L50 -20 Q70 -20 70 0 Q70 15 50 25 L25 35 Q15 40 15 55 L15 65 L70 65 L70 80 L0 80 L0 55 Q0 35 20 25 L45 15 Q55 10 55 -5 Q55 -15 45 -15 L30 -15 Q20 -15 20 -5 L20 0 Z" fill="#000000"/>
        
        <!-- "1" -->
        <rect x="90" y="-20" width="20" height="85" fill="#000000"/>
        <rect x="80" y="-20" width="30" height="10" fill="#000000"/>
      </g>
      
      <!-- Stability line -->
      <line x1="40" y1="190" x2="200" y2="190" stroke="#000000" stroke-width="4"/>
      
      <!-- Stability dots -->
      <circle cx="70" cy="190" r="8" fill="#000000"/>
      <circle cx="120" cy="190" r="8" fill="#000000"/>
      <circle cx="170" cy="190" r="8" fill="#000000"/>
    </g>
    
    <!-- Wordmark -->
    <g transform="translate(320, 70)">
      <!-- "Stable" - simplified sans-serif -->
      <text x="0" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="110" font-weight="300" fill="#000000">Stable</text>
      
      <!-- Tagline -->
      <text x="4" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="20" letter-spacing="0.2em" fill="#666666">STATISTICAL CONSULTING</text>
    </g>
  </svg>
</body>
</html>
