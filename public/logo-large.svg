<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 21Stable Icon - Large Format -->
  
  <!-- Background -->
  <rect width="200" height="200" fill="#ffffff"/>
  
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="85" stroke="#000000" stroke-width="3" fill="none"/>
  
  <!-- "21" in Georgia serif -->
  <text x="35" y="120" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="500" fill="#000000">21</text>
  
  <!-- Stability line -->
  <line x1="50" y1="145" x2="150" y2="145" stroke="#000000" stroke-width="3"/>
  
  <!-- Small stability markers -->
  <circle cx="60" cy="145" r="4" fill="#000000"/>
  <circle cx="100" cy="145" r="4" fill="#000000"/>
  <circle cx="140" cy="145" r="4" fill="#000000"/>
</svg>