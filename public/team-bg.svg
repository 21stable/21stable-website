<svg width="2560" height="1200" viewBox="0 0 2560 1200" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f9f9f9"/>
  
  <!-- Network pattern -->
  <defs>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#000" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#dots)"/>
  
  <!-- Interconnected circles -->
  <g fill="none" stroke="#000" stroke-width="0.75" opacity="0.08">
    <circle cx="400" cy="300" r="200"/>
    <circle cx="800" cy="400" r="250"/>
    <circle cx="1280" cy="350" r="300"/>
    <circle cx="1760" cy="400" r="250"/>
    <circle cx="2160" cy="300" r="200"/>
    
    <circle cx="400" cy="700" r="250"/>
    <circle cx="800" cy="800" r="300"/>
    <circle cx="1280" cy="750" r="350"/>
    <circle cx="1760" cy="800" r="300"/>
    <circle cx="2160" cy="700" r="250"/>
  </g>
  
  <!-- Connection network -->
  <g stroke="#000" stroke-width="0.5" opacity="0.15">
    <line x1="400" y1="300" x2="800" y2="400"/>
    <line x1="800" y1="400" x2="1280" y2="350"/>
    <line x1="1280" y1="350" x2="1760" y2="400"/>
    <line x1="1760" y1="400" x2="2160" y2="300"/>
    
    <line x1="400" y1="700" x2="800" y2="800"/>
    <line x1="800" y1="800" x2="1280" y2="750"/>
    <line x1="1280" y1="750" x2="1760" y2="800"/>
    <line x1="1760" y1="800" x2="2160" y2="700"/>
    
    <line x1="400" y1="300" x2="400" y2="700"/>
    <line x1="800" y1="400" x2="800" y2="800"/>
    <line x1="1280" y1="350" x2="1280" y2="750"/>
    <line x1="1760" y1="400" x2="1760" y2="800"/>
    <line x1="2160" y1="300" x2="2160" y2="700"/>
    
    <line x1="400" y1="300" x2="800" y2="800"/>
    <line x1="800" y1="400" x2="1280" y2="750"/>
    <line x1="1280" y1="350" x2="1760" y2="800"/>
    <line x1="1760" y1="400" x2="2160" y2="700"/>
  </g>
  
  <!-- Node points -->
  <g fill="#000" opacity="0.2">
    <circle cx="400" cy="300" r="4"/>
    <circle cx="800" cy="400" r="4"/>
    <circle cx="1280" cy="350" r="4"/>
    <circle cx="1760" cy="400" r="4"/>
    <circle cx="2160" cy="300" r="4"/>
    <circle cx="400" cy="700" r="4"/>
    <circle cx="800" cy="800" r="4"/>
    <circle cx="1280" cy="750" r="4"/>
    <circle cx="1760" cy="800" r="4"/>
    <circle cx="2160" cy="700" r="4"/>
  </g>
  
  <!-- Flow waves -->
  <g fill="none" stroke="#000" stroke-width="0.5" opacity="0.06">
    <path d="M 0 500 C 427 450 853 550 1280 500 C 1707 450 2133 550 2560 500"/>
    <path d="M 0 600 C 427 550 853 650 1280 600 C 1707 550 2133 650 2560 600"/>
    <path d="M 0 700 C 427 650 853 750 1280 700 C 1707 650 2133 750 2560 700"/>
  </g>
  
  <!-- Corner geometric elements -->
  <g fill="none" stroke="#000" stroke-width="0.5" opacity="0.1">
    <polygon points="100,100 150,100 150,150 100,150"/>
    <polygon points="2410,100 2460,100 2460,150 2410,150"/>
    <polygon points="100,1050 150,1050 150,1100 100,1100"/>
    <polygon points="2410,1050 2460,1050 2460,1100 2410,1100"/>
  </g>
</svg>
