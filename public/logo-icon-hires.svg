<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- 21Stable Icon Only - High Resolution for Social/Print -->
  
  <!-- White background -->
  <rect width="400" height="400" fill="#ffffff"/>
  
  <!-- Outer ring -->
  <circle cx="200" cy="200" r="180" stroke="#000000" stroke-width="6" fill="none"/>
  
  <!-- "21" in Georgia serif -->
  <text x="55" y="250" font-family="Georgia, 'Times New Roman', serif" font-size="150" font-weight="500" fill="#000000">21</text>
  
  <!-- Stability line -->
  <line x1="90" y1="295" x2="310" y2="295" stroke="#000000" stroke-width="6"/>
  
  <!-- Stability markers -->
  <circle cx="130" cy="295" r="12" fill="#000000"/>
  <circle cx="200" cy="295" r="12" fill="#000000"/>
  <circle cx="270" cy="295" r="12" fill="#000000"/>
</svg>