<svg width="2560" height="800" viewBox="0 0 2560 800" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#fafafa"/>
  
  <!-- Concentric circles pattern -->
  <defs>
    <radialGradient id="grad1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0.04"/>
      <stop offset="100%" style="stop-color:#000;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="grad2" cx="80%" cy="70%" r="50%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0.03"/>
      <stop offset="100%" style="stop-color:#000;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <circle cx="512" cy="240" r="400" fill="url(#grad1)"/>
  <circle cx="2048" cy="560" r="500" fill="url(#grad2)"/>
  
  <!-- Arc pattern -->
  <g fill="none" stroke="#000" stroke-width="0.75" opacity="0.1">
    <path d="M 0 200 A 800 800 0 0 1 800 0"/>
    <path d="M 0 240 A 840 840 0 0 1 840 0"/>
    <path d="M 0 280 A 880 880 0 0 1 880 0"/>
    <path d="M 0 320 A 920 920 0 0 1 920 0"/>
    
    <path d="M 1760 800 A 800 800 0 0 1 2560 0"/>
    <path d="M 1720 800 A 840 840 0 0 1 2560 40"/>
    <path d="M 1680 800 A 880 880 0 0 1 2560 80"/>
    <path d="M 1640 800 A 920 920 0 0 1 2560 120"/>
  </g>
  
  <!-- Diamond grid -->
  <g fill="none" stroke="#000" stroke-width="0.5" opacity="0.06">
    <polygon points="320,100 360,140 320,180 280,140"/>
    <polygon points="480,100 520,140 480,180 440,140"/>
    <polygon points="640,100 680,140 640,180 600,140"/>
    <polygon points="800,100 840,140 800,180 760,140"/>
    <polygon points="960,100 1000,140 960,180 920,140"/>
    <polygon points="1120,100 1160,140 1120,180 1080,140"/>
    <polygon points="1280,100 1320,140 1280,180 1240,140"/>
    <polygon points="1440,100 1480,140 1440,180 1400,140"/>
    <polygon points="1600,100 1640,140 1600,180 1560,140"/>
    <polygon points="1760,100 1800,140 1760,180 1720,140"/>
    <polygon points="1920,100 1960,140 1920,180 1880,140"/>
    <polygon points="2080,100 2120,140 2080,180 2040,140"/>
    <polygon points="2240,100 2280,140 2240,180 2200,140"/>
