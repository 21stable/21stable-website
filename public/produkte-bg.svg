  <!-- Horizontal lines -->
  <g stroke="#000" stroke-width="0.5" opacity="0.08">
    <line x1="0" y1="300" x2="2560" y2="300"/>
    <line x1="0" y1="400" x2="2560" y2="400"/>
    <line x1="0" y1="500" x2="2560" y2="500"/>
  </g>
  
  <!-- Accent dots -->
  <g fill="#000" opacity="0.15">
    <circle cx="200" cy="600" r="3"/>
    <circle cx="500" cy="640" r="3"/>
    <circle cx="800" cy="600" r="3"/>
    <circle cx="1100" cy="640" r="3"/>
    <circle cx="1400" cy="600" r="3"/>
    <circle cx="1700" cy="640" r="3"/>
